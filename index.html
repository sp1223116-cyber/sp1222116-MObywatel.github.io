<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

header{
padding:25px;
font-size:28px;
background:#1e293b;
}

.container{
max-width:500px;
margin:auto;
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:15px;
transition:0.2s;
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
background:#334155;
}

button{
padding:10px 15px;
border:none;
background:#2563eb;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<header>
Moja Strona
</header>

<div class="container">

<div class="card">
<h2>Informacje</h2>
<p>To jest przykładowa strona na GitHub Pages</p>
</div>

<div class="card">
<h2>Przycisk</h2>
<button onclick="pokaz()">Kliknij</button>
</div>

<div class="card">
<h2>Kontakt</h2>
<p>Email: example@email.com</p>
</div>

</div>

<script>

function pokaz(){
alert("Przycisk działa 🙂")
}

<script src="script.js"></script>

</body>

</html>

<button onclick="pokazInfo()">Informacja</button>
